reload = "restart"
category = "audio"
description = "Sound volume (0.0-1.0)"
range = "0.0-1.0"

# ═══════════════════════════════════════════════════════════════════════════════
# Streaming / Buffering
# ═══════════════════════════════════════════════════════════════════════════════

[vars.CODESCRIBE_BUFFERED_STREAM]
default = "1"
