# ENV_REGISTRY.toml - Central registry of all environment variables
#
# SINGLE SOURCE OF TRUTH for CodeScribe environment configuration.
# This file is validated by pre-commit hooks - any new env var MUST be added here.
#
# Schema per variable:
#   [vars.<NAME>]
#   default = "value"           # Default value (string)
#   type = "string|bool|f32|u64"  # Value type
#   reload = "hot|restart|rebuild"  # When changes take effect
#   category = "vad|audio|llm|..." # Grouping
#   description = "..."         # Human-readable description
#   deprecated = "NEW_VAR"      # If deprecated, points to replacement
#
# Created by M&K (c)2026 VetCoders

[meta]
version = "1.0.0"
updated = "2026-01-27"

# ═══════════════════════════════════════════════════════════════════════════════
# VAD (Voice Activity Detection) - Silero Neural Network
# ═══════════════════════════════════════════════════════════════════════════════

[vars.CODESCRIBE_VAD_ENABLED]
default = "1"
type = "bool"
reload = "restart"
category = "vad"
description = "Enable/disable VAD auto-stop on silence"

[vars.CODESCRIBE_VAD_THRESHOLD]
default = "0.35"
type = "f32"
reload = "restart"
category = "vad"
description = "Speech probability threshold (0.0-1.0). Lower = more sensitive"
range = "0.1-0.95"

[vars.CODESCRIBE_VAD_SILENCE_SEC]
default = "2.5"
type = "f32"
reload = "restart"
category = "vad"
description = "Silence duration (seconds) before auto-stop"
range = "0.1-10.0"

[vars.CODESCRIBE_VAD_MIN_SPEECH_SEC]
default = "0.1"
type = "f32"
reload = "restart"
category = "vad"
description = "Minimum speech duration before triggering (filters clicks)"
range = "0.01-1.0"

[vars.CODESCRIBE_VAD_MAX_UTTERANCE_SEC]
default = "60.0"
type = "f32"
reload = "restart"
category = "vad"
description = "Maximum utterance length before force flush"
range = "1.0-300.0"

[vars.CODESCRIBE_VAD_PRE_ROLL_SEC]
default = "0.5"
type = "f32"
reload = "restart"
category = "vad"
description = "Pre-roll buffer (seconds) before speech onset"
range = "0.0-2.0"

# DEPRECATED - use new names
[vars.AUTO_SILENCE]
deprecated = "CODESCRIBE_VAD_ENABLED"
description = "DEPRECATED: Use CODESCRIBE_VAD_ENABLED instead"

[vars.CODESCRIBE_VAD_MAX_SILENCE_SEC]
deprecated = "CODESCRIBE_VAD_SILENCE_SEC"
description = "DEPRECATED: Use CODESCRIBE_VAD_SILENCE_SEC instead"

[vars.CODESCRIBE_VAD_SENSITIVITY]
deprecated = "CODESCRIBE_VAD_THRESHOLD"
description = "DEPRECATED: Use CODESCRIBE_VAD_THRESHOLD instead"

