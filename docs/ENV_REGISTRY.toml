category = "streaming"
description = "Use buffered streaming mode (smoother output)"

[vars.CODESCRIBE_BUFFER_DELAY_MS]
default = "3000"
type = "u64"
reload = "hot"
category = "streaming"
description = "Initial buffer delay in milliseconds"

[vars.CODESCRIBE_TYPING_CPS]
default = "30"
type = "f32"
reload = "hot"
category = "streaming"
description = "Typing speed in characters per second"

[vars.CODESCRIBE_EMIT_WORDS_MAX]
default = "3"
type = "u64"
reload = "hot"
category = "streaming"
description = "Maximum words emitted per tick (buffered mode)"

[vars.CODESCRIBE_STREAM_CHUNK_SEC]
default = "15.0"
type = "f32"
reload = "hot"
category = "streaming"
description = "Streaming chunk duration in seconds"
range = "0.5-30.0"

[vars.CODESCRIBE_STREAM_OVERLAP_RATIO]
default = "0.25"
type = "f32"
reload = "hot"
category = "streaming"
description = "Overlap ratio between chunks"
range = "0.05-0.8"

[vars.CODESCRIBE_STREAM_SIMILARITY]
default = "0.93"
type = "f32"
reload = "hot"
category = "streaming"
description = "Similarity threshold for deduplication"

[vars.CODESCRIBE_STREAM_NOVELTY]
default = "0.12"
type = "f32"
reload = "hot"
category = "streaming"
description = "Novelty threshold for deduplication"

[vars.CODESCRIBE_STREAM_DISABLE_EMBEDDINGS]
default = "0"
type = "bool"
reload = "hot"
category = "streaming"
description = "Disable embedding-based deduplication"

